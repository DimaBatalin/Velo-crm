services:

  backend:
    build: ./backend
    container_name: velo_backend
    restart: unless-stopped

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: velo_frontend
    restart: unless-stopped

    ports:
      - "3000:80"

    depends_on:
      - backend

  postgres:
    image: postgres:16
    container_name: velo_postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: velo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: velo

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U velo"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
