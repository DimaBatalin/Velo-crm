services:

  nginx:
    image: nginx:1.27-alpine
    container_name: velo_nginx
    restart: unless-stopped

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

    depends_on:
      - backend
      - frontend

  backend:
    build: ./backend
    container_name: velo_backend
    restart: unless-stopped

    # Not published to the host — only reachable through nginx.
    expose:
      - "8000"

    env_file:
      - .env

    environment:
      # nginx strips /api before forwarding — tell FastAPI so /api/docs works.
      ROOT_PATH: /api

    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: velo_frontend
    restart: unless-stopped

    expose:
      - "80"

    depends_on:
      - backend

  postgres:
    image: postgres:16
    container_name: velo_postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: velo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: velo

    # Проброс ТОЛЬКО на localhost хоста: из интернета БД недоступна, но
    # можно подключиться pgAdmin'ом локально или через SSH-туннель к серверу.
    # Хостовый порт 5433 (а не 5432), чтобы не конфликтовать с локально
    # установленным Postgres. Внутри контейнера порт остаётся 5432.
    ports:
      - "127.0.0.1:5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U velo"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
